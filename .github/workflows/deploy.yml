name: CI/CD Pipeline - Nexura Protocol

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Test Smart Contracts
  test-contracts:
    name: Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          
      - name: Run Contract Tests
        run: cargo test --all --verbose
          
      - name: Build Contracts
        run: cargo build --target wasm32-unknown-unknown --release --verbose

  # Job 2: Build and Test Frontend
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-contracts
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        continue-on-error: true
        
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_SOROBAN_RPC: https://soroban-testnet.stellar.org
          NEXT_PUBLIC_HORIZON_URL: https://horizon-testnet.stellar.org
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 7

  # Job 3: Deployment Summary
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment Info
        run: |
          echo "✅ All tests passed"
          echo "✅ Frontend build successful"
          echo "🚀 Vercel auto-deployment active"
          echo "📍 Live URL: https://nexura-protocol.vercel.app"
          echo "📊 Deployment triggered at: $(date)"
